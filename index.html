<style>

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  select option { background: #1e293b; color: #e2e8f0; }

  /* Install banner */
  #install-banner {
    display: none; position: fixed; bottom: 80px; left: 12px; right: 12px;
    background: #0ea5e9; color: #fff; border-radius: 14px; padding: 14px 16px;
    z-index: 500; box-shadow: 0 8px 32px #0003;
    flex-direction: column; gap: 10px;
  }
  #install-banner.show { display: flex; }
  #install-banner .ib-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  #install-banner .ib-title { font-weight: 800; font-size: 15px; }
  #install-banner .ib-sub { font-size: 12px; opacity: .85; margin-top: 2px; }
  #install-banner .ib-btns { display: flex; gap: 8px; }
  #install-banner .ib-install { background: #fff; color: #0ea5e9; border: none; border-radius: 8px; padding: 8px 18px; font-weight: 800; font-size: 14px; }
  #install-banner .ib-dismiss { background: transparent; color: #fff; border: 1px solid #ffffff66; border-radius: 8px; padding: 8px 12px; font-size: 13px; }

  /* Offline badge */
  #offline-badge {
    display: none; position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
    background: #ef4444; color: #fff; border-radius: 20px; padding: 4px 14px;
    font-size: 11px; font-weight: 700; z-index: 600;
  }
  #offline-badge.show { display: block; }
</style>
</head>
<body>

<div id="offline-badge">📵 OFFLINE</div>
<div id="install-banner">

      <div class="ib-sub">Add to home screen — works offline</div>

  <div class="ib-btns">
    <button class="ib-install" id="ib-install-btn">Install App</button>

// ─── Helpers ──────────────────────────────────────────────────────────────────
function uid()   { return "v"+Date.now()+Math.floor(Math.random()*9999); }
function today() { return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString().slice(0,16); }
function stageOf(id){ return STAGES.find(s=>s.id===id)||STAGES[0]; }
function fmtDur(start,end){
  const m=Math.round((new Date(end||undefined)-new Date(start))/60000);
  if(isNaN(m)||m<0) return "0m";
  if(m<60) return m+"m";
  return Math.floor(m/60)+"h "+m%60+"m";
}

// localStorage persistence
const LS_KEY = "paneltrack_v2";
function loadData(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){}
  return null;
}
function saveData(vehicles){
  try { localStorage.setItem(LS_KEY, JSON.stringify(vehicles)); } catch(e){}
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════
function App(){
  const [vehicles,setVehicles] = useState(()=>{
    const saved = loadData();
    return saved || DEMO_VEHICLES;
  });
  const [view,setView]               = useState("dashboard");
  const [selectedId,setSelectedId]   = useState(null);
  const [bookInStep,setBookInStep]   = useState(null);
  const [newVehicle,setNewVehicle]   = useState(null);
  const [filterStage,setFilterStage] = useState("all");
  const [toast,setToast]             = useState(null);

  // Auto-save whenever vehicles change
  useEffect(()=>{ saveData(vehicles); }, [vehicles]);

  function showToast(msg,type="ok"){
    setToast({msg,type});
    setTimeout(()=>setToast(null),2800);
  }

  function updateVehicle(updated){
    setVehicles(prev=>prev.map(v=>v.id===updated.id?updated:v));
  }

  function moveToStage(vehicleId,stageId,staff,note=""){
    setVehicles(prev=>prev.map(v=>{
      if(v.id!==vehicleId) return v;
      const sessions=v.sessions.map(s=>s.end?s:{...s,end:nowISO()});
      return{...v,stage:stageId,sessions:[...sessions,{stage:stageId,start:nowISO(),end:null,staff,note}]};
    }));
    showToast("Moved to "+stageOf(stageId).label+" ✓");
  }

  function closeSession(vehicleId){
    setVehicles(prev=>prev.map(v=>
      v.id!==vehicleId?v:{...v,sessions:v.sessions.map(s=>s.end?s:{...s,end:nowISO()})}
    ));
    showToast("Session closed ✓");
  }

  function finishBookIn(vehicle){
    setVehicles(prev=>[...prev,vehicle]);
    setNewVehicle(null);
    setBookInStep(null);
    showToast(vehicle.plate+" booked in ✓");
  }

  const selected=vehicles.find(v=>v.id===selectedId);
  const stageCount={};
  STAGES.forEach(s=>{stageCount[s.id]=vehicles.filter(v=>v.stage===s.id).length;});
  const filtered=filterStage==="all"?vehicles:vehicles.filter(v=>v.stage===filterStage);

  function goDetail(id){ setSelectedId(id); setView("detail"); }

  return(
    <div style={S.app}>
      {/* Header */}
      <header style={S.header}>
        <div style={S.headerLeft}>
          <span style={{fontSize:24}}>🏗️</span>
          <div>
            <div style={S.headerTitle}>PanelTrack SA</div>
            <div style={S.headerSub}>{vehicles.filter(v=>v.stage!=="ready").length} active · {vehicles.filter(v=>v.stage==="ready").length} done</div>
          </div>
        </div>
        <button style={S.addBtn} onClick={()=>setBookInStep("form")}>+ Book In</button>
      </header>

      {/* Main content */}
      <main style={S.main}>
        {!selectedId && view==="dashboard" && <Dashboard vehicles={vehicles} stageCount={stageCount} onSelect={goDetail}/>}
        {!selectedId && view==="list"      && <VehicleList vehicles={filtered} filterStage={filterStage} setFilterStage={setFilterStage} onSelect={goDetail}/>}
        {!selectedId && view==="daily"     && <DailyView vehicles={vehicles} onSelect={goDetail}/>}
        {selectedId && selected && (
          <VehicleDetail
            vehicle={selected}
            onBack={()=>setSelectedId(null)}
            onMove={(sid,staff,note)=>moveToStage(selectedId,sid,staff,note)}
            onCloseSession={()=>closeSession(selectedId)}
            onUpdate={updateVehicle}
            showToast={showToast}
          />
        )}
      </main>

      {/* Bottom nav */}
      <nav style={S.nav}>
        {[["dashboard","📊","Floor"],["list","🚗","Vehicles"],["daily","📅","Daily"]].map(([v,ic,lb])=>(
          <button key={v} style={{...S.navBtn,...(view===v&&!selectedId?S.navActive:{})}}
            onClick={()=>{setView(v);setSelectedId(null);}}>
            <span style={{fontSize:22}}>{ic}</span>
            <span style={{fontSize:10}}>{lb}</span>
          </button>
        ))}
      </nav>

      {/* Book-in modals */}
      {bookInStep==="form" && <BookInForm onClose={()=>setBookInStep(null)} onNext={v=>{setNewVehicle(v);setBookInStep("photos");}}/>}
      {bookInStep==="photos" && newVehicle && <BookInPhotos vehicle={newVehicle} onChange={setNewVehicle} onDone={()=>finishBookIn(newVehicle)} onSkip={()=>finishBookIn(newVehicle)}/>}

      {/* Toast */}
      {toast && <div style={{...S.toast,background:toast.type==="ok"?"#22c55e":"#ef4444"}}>{toast.msg}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// BOOK-IN STEP 1
// ═══════════════════════════════════════════════════════════════════════════════
function BookInForm({onClose,onNext}){
  const [f,setF]=useState({plate:"",owner:"",phone:"",make:"",model:"",color:"",year:"",insurance:"",claimNo:"",estimatedDone:"",notes:""});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  function next(){
    if(!f.plate.trim()||!f.owner.trim()){alert("Number plate and owner name are required");return;}
    onNext({id:uid(),...f,stage:"booked_in",bookedIn:today(),photos:[],
      sessions:[{stage:"booked_in",start:nowISO(),end:nowISO(),staff:"Receptionist",note:"Booked in"}]});
  }
  return(
    <div style={S.overlay}>
      <div style={S.modal}>
        <div style={S.stepRow}>
          <div style={{...S.stepDot,background:"#0ea5e9"}}>1</div>
          <div style={S.stepLine}/>
          <div style={{...S.stepDot,background:"#334155"}}>2</div>
          <div style={{flex:1}}/>
          <button style={S.closeBtn} onClick={onClose}>✕</button>
        </div>
        <div style={{fontWeight:800,fontSize:18,color:"#f8fafc",marginBottom:2}}>📋 Vehicle Details</div>
        <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>Step 1 of 2 — photos come next</div>
        {[["plate","Number Plate *","CA 123-456","text"],["owner","Owner Name *","Full name","text"],
          ["phone","Phone","082 xxx xxxx","text"],["make","Make","Toyota","text"],
          ["model","Model","Corolla","text"],["color","Colour","Silver","text"],
          ["year","Year","2021","text"],["insurance","Insurance Co.","Outsurance","text"],
          ["claimNo","Claim Number","","text"],["estimatedDone","Est. Completion","","date"],
        ].map(([k,l,p,t])=>(
          <div key={k}>
            <label style={S.label}>{l}</label>
            <input style={S.input} type={t} placeholder={p} value={f[k]} onChange={e=>set(k,e.target.value)}/>
          </div>
        ))}
        <label style={S.label}>Damage Notes</label>
        <textarea style={S.textarea} rows={3} value={f.notes} onChange={e=>set("notes",e.target.value)} placeholder="Describe damage areas..."/>
        <button style={S.nextBtn} onClick={next}>Next: Take Photos →</button>
        <div style={{height:16}}/>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// BOOK-IN STEP 2 — PHOTOS
// ═══════════════════════════════════════════════════════════════════════════════
function BookInPhotos({vehicle,onChange,onDone,onSkip}){
  const fileRef=useRef();
  const [activeAngle,setActiveAngle]=useState(null);
  const byAngle={};
  vehicle.photos.forEach(p=>{byAngle[p.angleId]=p;});

  function shoot(angleId){setActiveAngle(angleId);fileRef.current.click();}
  function handleFile(e){
    const file=e.target.files[0];
    if(!file||!activeAngle) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const photo={id:uid(),src:ev.target.result,angleId:activeAngle,
        label:PHOTO_ANGLES.find(a=>a.id===activeAngle)?.label||activeAngle,date:today()};
      onChange({...vehicle,photos:[...vehicle.photos.filter(p=>p.angleId!==activeAngle),photo]});
    };
    reader.readAsDataURL(file);
    e.target.value="";
  }
  const taken=vehicle.photos.length;
  return(
    <div style={S.overlay}>
      <div style={{...S.modal,paddingBottom:0}}>
        <div style={S.stepRow}>
          <div style={{...S.stepDot,background:"#22c55e"}}>✓</div>
          <div style={{...S.stepLine,background:"#0ea5e9"}}/>
          <div style={{...S.stepDot,background:"#0ea5e9"}}>2</div>
          <div style={{flex:1}}/>
          <button style={{...S.closeBtn,width:"auto",borderRadius:8,padding:"4px 14px",fontSize:12,color:"#64748b"}} onClick={onSkip}>Skip →</button>
        </div>
        <div style={{fontWeight:800,fontSize:18,color:"#f8fafc",marginBottom:2}}>📷 Vehicle Photos</div>
        <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>{taken} photo{taken!==1?"s":""} taken — tap each angle to shoot</div>
        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={S.plateLg}>{vehicle.plate}</div>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:6}}>{vehicle.year} {vehicle.make} {vehicle.model} · {vehicle.color}</div>
        </div>
        <div style={S.angleGrid}>
          {PHOTO_ANGLES.map(a=>{
            const done=!!byAngle[a.id];
            return(
              <button key={a.id} style={{...S.angleBtn,...(done?S.angleDone:{})}} onClick={()=>shoot(a.id)}>
                {done?<img src={byAngle[a.id].src} alt={a.label} style={S.angleThumb}/>:<span style={{fontSize:26}}>{a.icon}</span>}
                <div style={{fontSize:10,color:done?"#22c55e":"#94a3b8",fontWeight:600,marginTop:4,textAlign:"center",lineHeight:1.2}}>
                  {done?"✓ ":""}{a.label}
                </div>
              </button>
            );
          })}
        </div>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFile}/>
        <div style={{padding:"0 0 24px"}}>
          <button style={S.doneBtn} onClick={onDone}>✓ Finish Book-In {taken>0?"("+taken+" photos)":""}</button>
        </div>
      </div>
    </div>
  );
}

// VEHICLE DETAIL
// ═══════════════════════════════════════════════════════════════════════════════
function VehicleDetail({vehicle:v,onBack,onMove,onCloseSession,onUpdate,showToast}){

  const openSession=v.sessions.find(s=>!s.end);
  const st=stageOf(v.stage);
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <button style={S.backBtn} onClick={onBack}>←</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={S.plateMed}>{v.plate}</div>
          <div style={{fontSize:11,color:"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.make} {v.model} · {v.owner}</div>
        </div>
        <div style={{...S.badge,background:st.color+"22",color:st.color,borderColor:st.color,flexShrink:0}}>
          {st.icon} {st.label}
        </div>
      </div>
      {openSession&&(
        <div style={S.liveBanner}>
          <div>
            <div style={{fontSize:11,fontWeight:800,color:"#ef4444"}}>🔴 LIVE SESSION</div>
            <div style={{fontSize:13,color:"#fca5a5"}}>{stageOf(openSession.stage).label} · {openSession.staff} · {fmtDur(openSession.start,null)}</div>
          </div>
          <button style={S.stopBtn} onClick={onCloseSession}>STOP ■</button>
        </div>
      )}
      <div style={S.tabs}>
        {[["move","🚦 Move"],["photos","📷 Photos"],["info","ℹ️ Info"],["timeline","⏱️ Log"]].map(([t,l])=>(
          <button key={t} style={{...S.tab,...(tab===t?S.tabActive:{})}} onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>
      {tab==="move"     && <MoveTab vehicle={v} onMove={onMove}/>}
      {tab==="photos"   && <PhotosTab vehicle={v} onUpdate={onUpdate} showToast={showToast}/>}
      {tab==="info"     && <InfoTab vehicle={v} onUpdate={onUpdate} showToast={showToast}/>}
      {tab==="timeline" && <TimelineTab sessions={v.sessions}/>}
    </div>

}

// ─── Move Tab ─────────────────────────────────────────────────────────────────
function MoveTab({vehicle:v,onMove}){
  const [staff,setStaff]=useState(STAFF_ROLES[0]);
  const [note,setNote]=useState("");
  const [confirm,setConfirm]=useState(null);
  const currentIdx=STAGES.findIndex(s=>s.id===v.stage);
  const openSession=v.sessions.find(s=>!s.end);

  function doMove(){onMove(confirm,staff,note);setConfirm(null);setNote("");}

  return(
    <div>
      <div style={S.staffRow}>
        <span style={{fontSize:12,color:"#64748b",whiteSpace:"nowrap"}}>Who's moving it?</span>
        <select style={S.selInline} value={staff} onChange={e=>setStaff(e.target.value)}>
          {STAFF_ROLES.map(r=><option key={r}>{r}</option>)}
        </select>
      </div>
      <div style={{...S.curStage,borderColor:stageOf(v.stage).color,background:stageOf(v.stage).color+"11"}}>
        <span style={{fontSize:28}}>{stageOf(v.stage).icon}</span>
        <div>
          <div style={{fontSize:10,color:"#64748b",fontWeight:700,letterSpacing:1}}>CURRENTLY AT</div>
          <div style={{fontSize:17,fontWeight:800,color:stageOf(v.stage).color}}>{stageOf(v.stage).label}</div>
          {openSession&&<div style={{fontSize:11,color:"#ef4444"}}>🔴 Running {fmtDur(openSession.start,null)}</div>}
        </div>
      </div>
      <div style={S.sl}>TAP A STAGE TO MOVE</div>
      <div style={S.stageGrid}>
        {STAGES.map((s,i)=>{
          const isCurrent=s.id===v.stage;
          const isDone=i<currentIdx;
          const isNext=i===currentIdx+1;
          return(
            <button key={s.id}
              style={{...S.stageTile,
                borderColor:isCurrent?s.color:isDone?"#2a3a50":isNext?s.color+"88":"#1e293b",
                background:isCurrent?s.color+"22":isDone?"#1a2434":"#1e293b",
                opacity:isDone?0.4:1,
              }}
              onClick={()=>{if(!isCurrent&&!isDone)setConfirm(s.id);}}>
              <span style={{fontSize:26}}>{s.icon}</span>
              <div style={{fontSize:10,fontWeight:isCurrent||isNext?700:400,
                color:isCurrent?s.color:isNext?s.color+"dd":"#64748b",
                lineHeight:1.2,textAlign:"center"}}>
                {s.label}
              </div>
              {isCurrent&&<div style={{fontSize:9,color:s.color,fontWeight:700}}>● HERE</div>}
              {isNext&&<div style={{fontSize:9,color:s.color+"aa"}}>→ NEXT</div>}
            </button>
          );
        })}
      </div>
      {confirm&&(
        <div style={S.confOv} onClick={e=>{if(e.target===e.currentTarget)setConfirm(null);}}>
          <div style={S.confSheet}>
            <div style={{fontSize:16,fontWeight:800,color:"#f8fafc",marginBottom:4}}>{stageOf(confirm).icon} Move to {stageOf(confirm).label}?</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>Open session will be closed automatically.</div>
            <label style={S.label}>Staff / Role</label>
            <select style={S.select} value={staff} onChange={e=>setStaff(e.target.value)}>
              {STAFF_ROLES.map(r=><option key={r}>{r}</option>)}
            </select>
            <label style={S.label}>Note (optional)</label>
            <input style={S.input} value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. Started sanding rear quarter"/>
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button style={S.cancelBtn} onClick={()=>setConfirm(null)}>Cancel</button>
              <button style={{...S.confirmBtn,background:stageOf(confirm).color}} onClick={doMove}>Move ✓</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Photos Tab ───────────────────────────────────────────────────────────────
function PhotosTab({vehicle:v,onUpdate,showToast}){
  const fileRef=useRef();
  const [activeAngle,setActiveAngle]=useState(null);
  const [lightbox,setLightbox]=useState(null);

  function shoot(angleId){setActiveAngle(angleId);fileRef.current.click();}
  function handleFile(e){
    const file=e.target.files[0];
    if(!file) return;
    const angle=activeAngle||"other";
    const reader=new FileReader();
    reader.onload=ev=>{
      const photo={id:uid(),src:ev.target.result,angleId:angle,
        label:PHOTO_ANGLES.find(a=>a.id===angle)?.label||"Photo",date:today()};
      const updated=angle!=="other"?v.photos.filter(p=>p.angleId!==angle):v.photos;
      onUpdate({...v,photos:[...updated,photo]});
      showToast("Photo saved ✓");
    };
    reader.readAsDataURL(file);
    e.target.value="";
  }
  const byAngle={};
  v.photos.forEach(p=>{if(!byAngle[p.angleId])byAngle[p.angleId]=[];byAngle[p.angleId].push(p);});

  return(
    <div>
      <div style={S.sl}>STANDARD ANGLES</div>
      <div style={S.angleGrid}>
        {PHOTO_ANGLES.map(a=>{
          const photos=byAngle[a.id]||[];
          const last=photos[photos.length-1];
          return(
            <button key={a.id} style={{...S.angleBtn,...(last?S.angleDone:{})}} onClick={()=>shoot(a.id)}>
              {last?<img src={last.src} alt={a.label} style={S.angleThumb} onClick={e=>{e.stopPropagation();setLightbox(last.src);}}/>:<span style={{fontSize:26}}>{a.icon}</span>}
              <div style={{fontSize:10,color:last?"#22c55e":"#94a3b8",fontWeight:600,marginTop:4,textAlign:"center",lineHeight:1.2}}>
                {last?"✓ ":""}{a.label}
              </div>
            </button>
          );
        })}
      </div>
      <button style={S.photoAddBtn} onClick={()=>{setActiveAngle("other");fileRef.current.click();}}>📷 Add Extra Photo</button>
      {(byAngle["other"]||[]).length>0&&(
        <>
          <div style={{...S.sl,marginTop:12}}>EXTRA PHOTOS</div>
          <div style={S.photoStrip}>
            {(byAngle["other"]||[]).map(p=>(
              <img key={p.id} src={p.src} alt="extra" style={{...S.stripImg,cursor:"pointer"}} onClick={()=>setLightbox(p.src)}/>
            ))}
          </div>
        </>
      )}
      <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFile}/>
      {lightbox&&(
        <div style={{position:"fixed",inset:0,background:"#000000ee",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setLightbox(null)}>
          <img src={lightbox} alt="full" style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:8}}/>
        </div>
      )}
    </div>
  );
}

// ─── Info Tab ─────────────────────────────────────────────────────────────────
function InfoTab({vehicle:v,onUpdate,showToast}){
  const [notes,setNotes]=useState(v.notes||"");
  return(
    <div>

        ["Vehicle",v.year+" "+v.make+" "+v.model+" ("+v.color+")"],

        ["Booked In",v.bookedIn],["Est. Done",v.estimatedDone],
      ].map(([l,val])=>(
        <div key={l} style={S.infoRow}>
          <span style={{fontSize:11,color:"#64748b"}}>{l}</span>

// ─── Timeline Tab ─────────────────────────────────────────────────────────────
function TimelineTab({sessions}){
  return(
    <div>
      {sessions.length===0&&<div style={S.empty}>No sessions yet</div>}
      {[...sessions].reverse().map((s,i)=>{
        const st=stageOf(s.stage);
        return(
          <div key={i} style={{...S.tlItem,borderLeftColor:st.color}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:700,color:st.color}}>{st.icon} {st.label}</div>
              <div style={{fontSize:11,color:"#64748b"}}>{s.end?fmtDur(s.start,s.end):<span style={{color:"#22c55e"}}>🔴 LIVE</span>}</div>
            </div>
            <div style={{fontSize:12,color:"#94a3b8"}}>{s.staff}</div>
            {s.note&&<div style={{fontSize:12,color:"#cbd5e1",marginTop:2}}>{s.note}</div>}
            <div style={{fontSize:10,color:"#475569",marginTop:2}}>
              {s.start?.slice(0,16).replace("T"," ")}{s.end?" → "+s.end.slice(11,16):" → now"}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({vehicles,stageCount,onSelect}){
  const urgent=vehicles.filter(v=>{
    if(!v.estimatedDone||v.stage==="ready") return false;
    return(new Date(v.estimatedDone)-new Date())/86400000<=1;
  });
  return(
    <div>
      <div style={S.sl}>SHOP FLOOR</div>
      <div style={S.pipeline}>
        {STAGES.filter(s=>s.id!=="ready").map(st=>(
          <div key={st.id} style={{...S.pipeCard,borderColor:st.color}}>
            <div style={{fontSize:18}}>{st.icon}</div>
            <div style={{fontSize:22,fontWeight:700,color:st.color}}>{stageCount[st.id]||0}</div>
            <div style={{fontSize:9,color:"#94a3b8",textAlign:"center",lineHeight:1.2}}>{st.label}</div>
          </div>
        ))}
      </div>
      {urgent.length>0&&<>
        <div style={{...S.sl,color:"#ef4444"}}>⚠️ DUE SOON / OVERDUE</div>
        {urgent.map(v=><VehicleCard key={v.id} vehicle={v} onClick={()=>onSelect(v.id)} highlight/>)}
      </>}
      <div style={S.sl}>ACTIVE ({vehicles.filter(v=>v.stage!=="ready").length})</div>
      {vehicles.filter(v=>v.stage!=="ready").length===0&&<div style={S.empty}>No active vehicles</div>}
      {vehicles.filter(v=>v.stage!=="ready").map(v=><VehicleCard key={v.id} vehicle={v} onClick={()=>onSelect(v.id)}/>)}
      {vehicles.filter(v=>v.stage==="ready").length>0&&<>
        <div style={{...S.sl,color:"#22c55e"}}>✅ COMPLETED</div>
        {vehicles.filter(v=>v.stage==="ready").map(v=><VehicleCard key={v.id} vehicle={v} onClick={()=>onSelect(v.id)}/>)}
      </>}
    </div>
  );
}

function VehicleList({vehicles,filterStage,setFilterStage,onSelect}){
  return(
    <div>
      <div style={S.sl}>FILTER BY STAGE</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        <button style={{...S.chip,...(filterStage==="all"?S.chipActive:{})}} onClick={()=>setFilterStage("all")}>All</button>
        {STAGES.map(s=>(
          <button key={s.id} style={{...S.chip,...(filterStage===s.id?{...S.chipActive,background:s.color,borderColor:s.color}:{})}} onClick={()=>setFilterStage(s.id)}>
            {s.icon} {s.label}
          </button>
        ))}
      </div>
      {vehicles.length===0&&<div style={S.empty}>No vehicles in this stage</div>}
      {vehicles.map(v=><VehicleCard key={v.id} vehicle={v} onClick={()=>onSelect(v.id)}/>)}
    </div>
  );
}

function DailyView({vehicles,onSelect}){
  const todaySessions=vehicles.flatMap(v=>
    v.sessions.filter(s=>s.start?.startsWith(today())).map(s=>({...s,vehicle:v}))
  ).sort((a,b)=>a.start>b.start?-1:1);
  const stageStats={};
  STAGES.forEach(s=>{stageStats[s.id]=[];});
  vehicles.forEach(v=>v.sessions.forEach(s=>{
    if(s.end) stageStats[s.stage]?.push((new Date(s.end)-new Date(s.start))/3600000);
  }));
  return(
    <div>
      <div style={S.sl}>TODAY — {new Date().toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long"})}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        <StatCard label="Active Jobs" value={vehicles.filter(v=>v.stage!=="ready").length} color="#0ea5e9"/>
        <StatCard label="Sessions Today" value={todaySessions.length} color="#a855f7"/>
        <StatCard label="Completed" value={vehicles.filter(v=>v.stage==="ready").length} color="#22c55e"/>
        <StatCard label="Live Now" value={vehicles.filter(v=>v.sessions.some(s=>!s.end)).length} color="#ef4444"/>
      </div>
      <div style={S.sl}>AVG TIME PER STAGE</div>
      {STAGES.filter(s=>stageStats[s.id]?.length).map(s=>{
        const avg=stageStats[s.id].reduce((a,b)=>a+b,0)/stageStats[s.id].length;
        return(
          <div key={s.id} style={S.statRow}>
            <span style={{color:s.color}}>{s.icon} {s.label}</span>
            <span style={{fontWeight:700}}>{Math.floor(avg)}h {Math.round((avg%1)*60)}m</span>
          </div>
        );
      })}
      <div style={S.sl}>TODAY'S SESSIONS</div>
      {todaySessions.length===0&&<div style={S.empty}>No sessions logged today yet</div>}
      {todaySessions.map((s,i)=>{
        const st=stageOf(s.stage);
        return(
          <div key={i} style={{...S.tlItem,borderLeftColor:st.color,cursor:"pointer"}} onClick={()=>onSelect(s.vehicle.id)}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:st.color,fontWeight:700}}>{st.icon} {st.label}</span>
              <span style={{fontSize:11,color:"#64748b"}}>{s.end?fmtDur(s.start,s.end):<span style={{color:"#22c55e"}}>LIVE</span>}</span>
            </div>
            <div style={{fontSize:12,color:"#e2e8f0"}}>{s.vehicle.plate} · {s.vehicle.make} {s.vehicle.model}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>{s.staff}</div>
          </div>
        );
      })}
    </div>
  );
}

  const st=stageOf(v.stage);

  return(
    <div style={{...S.card,...(highlight?{borderColor:"#ef4444",borderWidth:2}:{})}} onClick={onClick}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{minWidth:0,flex:1}}>
          <div style={S.plateMed}>{v.plate}</div>
          <div style={{fontSize:12,color:"#94a3b8"}}>{v.year} {v.make} {v.model}</div>
          <div style={{fontSize:11,color:"#64748b"}}>{v.owner}</div>

function StatCard({label,value,color}){
  return(
    <div style={{background:"#1e293b",borderRadius:10,padding:"12px 14px",border:"1px solid "+color+"33"}}>
      <div style={{fontSize:28,fontWeight:800,color}}>{value}</div>
      <div style={{fontSize:11,color:"#64748b"}}>{label}</div>
    </div>
  );
}

<script>
// ─── PWA Install prompt ───────────────────────────────────────────────────────
let deferredPrompt = null;
const banner   = document.getElementById("install-banner");
const installBtn = document.getElementById("ib-install-btn");
const dismissBtn = document.getElementById("ib-dismiss-btn");

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show after 3 seconds so app loads first
  setTimeout(() => { if(deferredPrompt) banner.classList.add("show"); }, 3000);
});

installBtn && installBtn.addEventListener("click", async () => {
  if(!deferredPrompt) return;
  banner.classList.remove("show");
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
});

dismissBtn && dismissBtn.addEventListener("click", () => {
  banner.classList.remove("show");
});

window.addEventListener("appinstalled", () => {
  banner.classList.remove("show");
  deferredPrompt = null;
});

// ─── Offline detection ────────────────────────────────────────────────────────
const offlineBadge = document.getElementById("offline-badge");
function updateOnline(){
  if(!navigator.onLine) offlineBadge.classList.add("show");
  else offlineBadge.classList.remove("show");
}
window.addEventListener("online",  updateOnline);
window.addEventListener("offline", updateOnline);
updateOnline();

// ─── Service Worker (inline, for offline caching) ─────────────────────────────
if("serviceWorker" in navigator){
  const swCode = `
    const CACHE = "paneltrack-v2";
    const URLS = [self.location.href];
    self.addEventListener("install", e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)).then(()=>self.skipWaiting()));
    });
    self.addEventListener("activate", e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener("fetch", e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }).catch(() => caches.match(e.request)))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type:"text/javascript"});
  const swURL  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(()=>{});
}
</script>
